name: atlas_ai_backend
description: Dart backend service for Atlas AI using Genkit flows and secure REST APIs.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.4

dependencies:
  crypto: ^3.0.7
  dart_jsonwebtoken: ^3.3.2
  genkit: ^0.11.1
  genkit_anthropic: ^0.2.2
  genkit_google_genai: ^0.2.1
  logging: ^1.3.0
  schemantic: ^0.1.1
  shared_contracts:
    path: ../packages/shared_contracts
  shelf: ^1.4.2
  shelf_router: ^1.1.4

dev_dependencies:
  build_runner: ^2.12.2
  lints: ^6.0.0
  test: ^1.26.3
